<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="">
    <title></title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Shippori+Mincho:wght@400;500;700&family=Syne+Tactile&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="assets/js/app.js" defer></script>
  </head>
  <body>
    <a id="skip-link" class="skip-link" href="#main"></a>

    <section id="intro-screen" role="region" aria-label="" tabindex="0">
      <blockquote>
        <p id="intro-quote"></p>
        <cite id="intro-author"></cite>
      </blockquote>
    </section>

    <header class="site-header">
      <p id="site-owner" class="lofi-mark"></p>
      <h1 id="site-title" class="site-title" tabindex="-1"><span id="site-title-text"></span><span class="title-dot">.</span></h1>
      <nav aria-label="">
        <a id="info-link" href="info.html"></a>
      </nav>
    </header>

    <main id="main" tabindex="-1">
      <section class="filter-section" aria-labelledby="filters-title">
        <h2 id="filters-title" class="visually-hidden"></h2>
        <div id="tagFilters" class="tag-filters" role="list" aria-live="polite"></div>
      </section>

      <section class="gallery-section" aria-labelledby="gallery-title">
        <h2 id="gallery-title" class="visually-hidden"></h2>
        <div id="gallery" class="gallery" aria-live="polite"></div>
        <p id="galleryStatus" class="gallery-status" role="status"></p>
      </section>

      <section id="textFallback" class="text-fallback" aria-labelledby="text-fallback-title">
        <h2 id="text-fallback-title"></h2>
        <p id="textFallbackDescription"></p>
        <ul></ul>
      </section>
    </main>

    <div id="videoOverlay" class="video-overlay" role="dialog" aria-modal="true" aria-labelledby="overlayTitle" hidden>
      <div class="overlay-plane" data-close-overlay></div>
      <div class="video-dialog">
        <button id="closeVideoButton" class="close-button" type="button" data-close-overlay aria-label=""></button>
        <p id="overlayTagline" class="lofi-mark"></p>
        <h2 id="overlayTitle"></h2>
        <p id="overlayDescription" class="overlay-description"></p>
        <div id="versionSwitcher" class="version-switcher" aria-label=""></div>
        <video id="overlayVideo" controls playsinline preload="metadata">
          <track kind="captions" srclang="en" label="English captions">
        </video>
        <p id="overlayTranscript" class="transcript-note"></p>
      </div>
    </div>

    <footer class="site-footer">
      <div id="footerBadges" class="footer-badges" aria-label=""></div>
      <p id="footerCredit"></p>
    </footer>
  </body>
</html>
